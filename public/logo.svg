<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Premium Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" /> <!-- Violet -->
      <stop offset="100%" stop-color="#2563eb" /> <!-- Blue -->
    </linearGradient>
    
    <!-- Outer Glow for Premium Feel -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#7c3aed" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Hexagonal background shield -->
  <path d="M50 5 L90 28 L90 72 L50 95 L10 72 L10 28 Z" fill="url(#logoGrad)" opacity="0.1" />

  <!-- Monogram F + Growth Arrow -->
  <g filter="url(#glow)">
    <!-- Vertical stem of F -->
    <rect x="25" y="22" width="10" height="56" rx="5" fill="url(#logoGrad)" />
    
    <!-- Top arm of F -->
    <path d="M30 22 H65 C68 22, 70 24, 70 27 C70 30, 68 32, 65 32 H30 V22 Z" fill="url(#logoGrad)" />
    
    <!-- Middle arm of F ending in a dynamic upward arrow -->
    <path d="M30 44 H55 C58 44, 60 46, 60 49 C60 52, 58 54, 55 54 H30 V44 Z" fill="url(#logoGrad)" />
    
    <!-- Dynamic glowing accent bolt/arrow crossing through -->
    <path d="M42 70 L58 42 H45 L62 20" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
